<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Deep black background -->
  <rect x="10" y="10" width="180" height="180" rx="36" fill="#09090B"/>

  <!-- Subtle dark vignette ring -->
  <rect x="10" y="10" width="180" height="180" rx="36" fill="none" stroke="#18181B" stroke-width="3"/>

  <!-- Hooded cloak shape — shadowy figure -->
  <path d="M 60,160 Q 60,70 100,50 Q 140,70 140,160 Z" fill="#18181B"/>
  <path d="M 65,160 Q 65,75 100,55 Q 135,75 135,160 Z" fill="#1C1C22"/>

  <!-- Face void — deep shadow under hood -->
  <ellipse cx="100" cy="105" rx="28" ry="32" fill="#09090B"/>

  <!-- Eyes — eerie glowing red/crimson -->
  <ellipse cx="87" cy="100" rx="6" ry="4" fill="#DC2626"/>
  <ellipse cx="113" cy="100" rx="6" ry="4" fill="#DC2626"/>

  <!-- Eye glow effect — smaller bright core -->
  <ellipse cx="87" cy="100" rx="3" ry="2" fill="#EF4444"/>
  <ellipse cx="113" cy="100" rx="3" ry="2" fill="#EF4444"/>

  <!-- Faint eye glow halos -->
  <ellipse cx="87" cy="100" rx="10" ry="7" fill="#DC2626" opacity="0.1"/>
  <ellipse cx="113" cy="100" rx="10" ry="7" fill="#DC2626" opacity="0.1"/>

  <!-- Sync arrows floating below face — ghostly -->
  <path d="M 82,125 L 98,125" stroke="#71717A" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="98,125 94,122 94,128" fill="#71717A"/>
  <path d="M 118,130 L 102,130" stroke="#71717A" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="102,130 106,127 106,133" fill="#71717A"/>

  <!-- Keyhole on chest — faint -->
  <circle cx="100" cy="148" r="5" fill="none" stroke="#3F3F46" stroke-width="1.5"/>
  <rect x="98.5" y="148" width="3" height="7" rx="1" fill="#3F3F46"/>
</svg>
