<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="36" fill="#0F172A"/>
  <rect x="10" y="10" width="180" height="180" rx="36" fill="none" stroke="#1E293B" stroke-width="2"/>

  <!-- Robot head outline -->
  <rect x="50" y="55" width="100" height="90" rx="18" fill="#1E293B" stroke="#334155" stroke-width="2"/>

  <!-- Antenna -->
  <line x1="100" y1="55" x2="100" y2="35" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="30" r="6" fill="#F59E0B"/>

  <!-- Eyes — glowing amber -->
  <circle cx="75" cy="90" r="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="125" cy="90" r="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="75" cy="90" r="5" fill="#F59E0B"/>
  <circle cx="125" cy="90" r="5" fill="#F59E0B"/>

  <!-- Mouth — sync arrows -->
  <path d="M 75,120 L 95,120" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="95,120 89,116 89,124" fill="#F59E0B"/>
  <path d="M 125,128 L 105,128" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="105,128 111,124 111,132" fill="#F59E0B"/>

  <!-- Ears — small rectangles -->
  <rect x="38" y="80" width="12" height="24" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <rect x="150" y="80" width="12" height="24" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>

  <!-- Lock icon below robot (small) -->
  <rect x="90" y="158" width="20" height="14" rx="3" fill="#F59E0B"/>
  <path d="M 95,158 L 95,152 A 5,5 0 0,1 105,152 L 105,158" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="165" r="2" fill="#0F172A"/>
</svg>
