<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="git-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="machine-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="#F8FAFC" rx="12"/>

  <!-- Git Repository (center top) -->
  <g filter="url(#shadow)">
    <rect x="260" y="30" width="200" height="70" rx="12" fill="url(#git-bg)"/>
    <text x="360" y="58" text-anchor="middle" fill="white" font-size="13" font-weight="600">Private Git Repository</text>
    <text x="360" y="78" text-anchor="middle" fill="#C4B5FD" font-size="11">encrypted store</text>
  </g>

  <!-- Connection lines -->
  <g stroke="#CBD5E1" stroke-width="2" fill="none">
    <!-- Center line down -->
    <line x1="360" y1="100" x2="360" y2="140"/>
    <!-- Branches to machines -->
    <path d="M 360,140 L 120,180" />
    <path d="M 360,140 L 360,180" />
    <path d="M 360,140 L 600,180" />
  </g>

  <!-- Arrows -->
  <g fill="#CBD5E1">
    <polygon points="120,180 126,170 114,170"/>
    <polygon points="360,180 366,170 354,170"/>
    <polygon points="600,180 606,170 594,170"/>
  </g>

  <!-- Machine A -->
  <g filter="url(#shadow)">
    <rect x="30" y="185" width="180" height="120" rx="10" fill="url(#machine-bg)"/>
    <text x="120" y="212" text-anchor="middle" fill="white" font-size="13" font-weight="600">Machine A</text>
    <text x="120" y="232" text-anchor="middle" fill="#94A3B8" font-size="11">branch: machines/a</text>
    <rect x="50" y="248" width="140" height="32" rx="6" fill="#1E3A5F"/>
    <text x="120" y="269" text-anchor="middle" fill="#60A5FA" font-size="12" font-family="monospace">~/.claude</text>
  </g>

  <!-- Machine B -->
  <g filter="url(#shadow)">
    <rect x="270" y="185" width="180" height="120" rx="10" fill="url(#machine-bg)"/>
    <text x="360" y="212" text-anchor="middle" fill="white" font-size="13" font-weight="600">Machine B</text>
    <text x="360" y="232" text-anchor="middle" fill="#94A3B8" font-size="11">branch: machines/b</text>
    <rect x="290" y="248" width="140" height="32" rx="6" fill="#1E3A5F"/>
    <text x="360" y="269" text-anchor="middle" fill="#60A5FA" font-size="12" font-family="monospace">~/.claude</text>
  </g>

  <!-- Machine C -->
  <g filter="url(#shadow)">
    <rect x="510" y="185" width="180" height="120" rx="10" fill="url(#machine-bg)"/>
    <text x="600" y="212" text-anchor="middle" fill="white" font-size="13" font-weight="600">Machine C</text>
    <text x="600" y="232" text-anchor="middle" fill="#94A3B8" font-size="11">branch: machines/c</text>
    <rect x="530" y="248" width="140" height="32" rx="6" fill="#1E3A5F"/>
    <text x="600" y="269" text-anchor="middle" fill="#60A5FA" font-size="12" font-family="monospace">~/.claude</text>
  </g>

  <!-- Push pipeline -->
  <g filter="url(#shadow)">
    <rect x="30" y="335" width="320" height="45" rx="8" fill="#0F172A"/>
    <text x="42" y="355" fill="#F59E0B" font-size="10" font-weight="700">PUSH</text>
    <text x="85" y="355" fill="#94A3B8" font-size="10">~/.claude</text>
    <text x="140" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="155" y="355" fill="#94A3B8" font-size="10">Filter</text>
    <text x="190" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="205" y="355" fill="#94A3B8" font-size="10">PathMap</text>
    <text x="252" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="267" y="355" fill="#94A3B8" font-size="10">Scan</text>
    <text x="295" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="310" y="355" fill="#22C55E" font-size="10">Encrypt</text>
    <text x="42" y="370" fill="#475569" font-size="9">classify &bull; normalize paths &bull; detect secrets &bull; AES-SIV &bull; git push</text>
  </g>

  <!-- Pull pipeline -->
  <g filter="url(#shadow)">
    <rect x="370" y="335" width="320" height="45" rx="8" fill="#0F172A"/>
    <text x="382" y="355" fill="#3B82F6" font-size="10" font-weight="700">PULL</text>
    <text x="418" y="355" fill="#94A3B8" font-size="10">Git pull</text>
    <text x="462" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="477" y="355" fill="#22C55E" font-size="10">Decrypt</text>
    <text x="520" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="535" y="355" fill="#94A3B8" font-size="10">Remap</text>
    <text x="572" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="587" y="355" fill="#94A3B8" font-size="10">Merge</text>
    <text x="622" y="355" fill="#64748B" font-size="10">&rarr;</text>
    <text x="640" y="355" fill="#EF4444" font-size="10">Secure</text>
    <text x="382" y="370" fill="#475569" font-size="9">fetch &bull; decrypt .age &bull; remap paths &bull; deep-merge &bull; strip hooks</text>
  </g>
</svg>
